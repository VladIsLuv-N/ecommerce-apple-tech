name: ecommerce_apple_tech_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.3
  get_it: ^9.2.0
  go_router: ^17.0.1
  skeletonizer: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_native_splash:
  color: "#FF6B57"
  image: assets/app_splash.png
  
  color_dark: "#FF6B57"
  image_dark: assets/app_splash.png
  
  android_12:
    image: assets/app_splash.png
    color: "#FF6B57"
    
  android_gravity: center
  ios_content_mode: center
  fullscreen: true